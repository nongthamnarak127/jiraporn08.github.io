<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แนะนำตัว</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 350px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4facfe;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0077ff;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile" class="profile">

        <h1>สวัสดีค่ะ 👋</h1>

        <p><strong>ชื่อ:</strong> เตย</p>
        <p><strong>งานอดิเรก:</strong> เรียนภาษาญี่ปุ่น ดูอนิเมะ และเขียนโค้ด</p>
        <p><strong>เป้าหมาย:</strong> พัฒนาทักษะด้านโปรแกรมมิ่งและภาษา</p>

        <a href="https://github.com/yourusername" class="btn">
            GitHub ของฉัน
        </a>
    </div>

</body>
</html>
